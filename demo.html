<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG知识库助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-area {
            padding: 20px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
        }
        .user-message {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        .bot-message {
            background: white;
            border-left: 4px solid #4caf50;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .sources {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
        .sources strong {
            color: #333;
        }
        .input-area {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #667eea;
        }
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .typing {
            display: inline-block;
            color: #999;
        }
        .typing::after {
            content: '...';
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .loading {
            display: inline-flex;
            gap: 4px;
        }
        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .config {
            padding: 10px 20px;
            background: #f5f5f5;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #666;
        }
        .config input {
            width: 200px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ RAG网络安全知识库</h1>
            <p>基于检索增强生成的智能问答系统</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message bot-message">
                👋 你好！我是网络安全知识助手。有什么可以帮你的吗？
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="输入问题，例如：什么是SQL注入攻击？" />
            <button onclick="askQuestion()" id="sendBtn">发送</button>
        </div>

        <div class="config">
            服务器地址: <input type="text" id="serverUrl" value="http://localhost:8000" />
            API Key: <input type="password" id="apiKey" placeholder="可选" />
        </div>
    </div>

    <script>
        // RAGClient 类定义
        class RAGClient {
            constructor(baseUrl, apiKey = null) {
                this.baseUrl = baseUrl.replace(/\/$/, '');
                this.apiKey = apiKey;
            }

            askStream(question, callbacks = {}) {
                const url = `${this.baseUrl}/api/ask`;
                const headers = { 'Content-Type': 'application/json' };
                if (this.apiKey) headers['X-API-Key'] = this.apiKey;

                let controller = new AbortController();
                let fullAnswer = '';

                fetch(url, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ question, top_k: 3 }),
                    signal: controller.signal
                }).then(async response => {
                    if (!response.ok) {
                        const error = await response.text();
                        throw new Error(`HTTP ${response.status}: ${error}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let currentEventType = '';

                    const processText = (text) => {
                        const lines = text.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                currentEventType = line.slice(7).trim();
                            } else if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    handleEvent(currentEventType, data);
                                } catch (e) {
                                    console.error('解析失败:', line.slice(6));
                                }
                            }
                        }
                    };

                    const handleEvent = (eventType, data) => {
                        switch (eventType) {
                            case 'metadata':
                                callbacks.onMetadata?.(data);
                                break;
                            case 'sources':
                                callbacks.onSources?.(data);
                                break;
                            case 'chunk':
                                fullAnswer += data.content;
                                callbacks.onChunk?.(data.content, fullAnswer);
                                break;
                            case 'done':
                                callbacks.onDone?.(fullAnswer);
                                break;
                            case 'error':
                                callbacks.onError?.(data.error);
                                break;
                        }
                    };

                    const read = () => {
                        reader.read().then(({ done, value }) => {
                            if (done) return;
                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop() || '';
                            processText(lines.join('\n'));
                            read();
                        });
                    };
                    read();
                }).catch(error => {
                    callbacks.onError?.(error.message);
                });

                return {
                    close: () => controller.abort(),
                    get fullAnswer() { return fullAnswer; }
                };
            }
        }

        // 聊天界面逻辑
        let currentBotMessage = null;
        let currentSourcesDiv = null;

        function appendMessage(type, content) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.innerHTML = content;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function askQuestion() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) return;

            const serverUrl = document.getElementById('serverUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const sendBtn = document.getElementById('sendBtn');

            // 显示用户消息
            appendMessage('user', question);
            input.value = '';

            // 创建机器人消息容器
            currentBotMessage = appendMessage('bot', '<div class="loading"><span></span><span></span><span></span></div>');

            // 禁用按钮
            sendBtn.disabled = true;

            // 创建客户端并发起请求
            const client = new RAGClient(serverUrl, apiKey || null);
            let answerContent = '';

            client.askStream(question, {
                onSources: (data) => {
                    // 保存来源信息，稍后显示
                    if (data.sources && data.sources.length > 0) {
                        currentSourcesDiv = document.createElement('div');
                        currentSourcesDiv.className = 'sources';
                        currentSourcesDiv.innerHTML = `<strong>📚 来源：</strong>${data.sources.join('、')}`;
                    }
                },
                onChunk: (content, fullAnswer) => {
                    // 更新回答内容
                    answerContent = fullAnswer;
                    currentBotMessage.innerHTML = answerContent.replace(/\n/g, '<br>');
                },
                onDone: () => {
                    // 完成，添加来源信息
                    if (currentSourcesDiv) {
                        currentBotMessage.appendChild(currentSourcesDiv);
                    }
                    sendBtn.disabled = false;
                },
                onError: (error) => {
                    currentBotMessage.innerHTML = `<span style="color: #f44336;">❌ 错误: ${error}</span>`;
                    sendBtn.disabled = false;
                }
            });
        }

        // 回车发送
        document.getElementById('question').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askQuestion();
        });
    </script>
</body>
</html>
